services:
  gateway:
    image: node:20-alpine
    container_name: api-gateway
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install && npm start"
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      AUTH_SERVICE_URL: http://host.docker.internal:5001
      DOCTOR_SERVICE_URL: http://host.docker.internal:5002
