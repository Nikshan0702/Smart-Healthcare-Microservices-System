services:
  auth-service:
    image: node:20-alpine
    container_name: auth-service
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install && npm start"
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      MONGO_URI: mongodb://host.docker.internal:27017/healthcare_auth
      JWT_SECRET: supersecretkey
