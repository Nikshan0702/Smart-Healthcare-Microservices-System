apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: smart-healthcare-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:5001"
            - name: DOCTOR_SERVICE_URL
              value: "http://doctor-service:5002"
            - name: APPOINTMENT_SERVICE_URL
              value: "http://appointment-service:5003"
            - name: TELEMEDICINE_SERVICE_URL
              value: "http://telemedicine-service:5007"
            - name: PATIENT_SERVICE_URL
              value: "http://patient-service:5004"
            - name: PAYMENT_SERVICE_URL
              value: "http://payment-service:5005"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:5006"
